<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>貪婪之島 圖鑑</title>
<meta name="theme-color" content="#0d0a05">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="貪婪之島">
<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #0d0a05;
  --surface: #1a1208;
  --card-cream: #f0e6c8;
  --card-border: #7a1515;
  --card-inner-border: #b8922a;
  --gold: #c9960f;
  --gold-bright: #f0c030;
  --red: #8b1a1a;
  --text: #ede0c0;
  --text-dim: #8a7550;
  --ss: #6a1b7a; --s: #1a4f8a; --a: #1a6e32; --b: #7a5010;
  --c: #404040; --d: #8a3010; --f: #1a5858; --g: #5a1a5a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: linear-gradient(180deg, #1a0c04 0%, #0d0802 100%);
  border-bottom: 2px solid var(--gold);
  padding: 10px 14px 8px;
}
.hrow1 { display: flex; align-items: center; justify-content: space-between; }
.title-wrap { display: flex; align-items: baseline; gap: 8px; }
.title-main { font-size: 20px; font-weight: 900; color: var(--gold-bright); letter-spacing: 2px; text-shadow: 0 0 14px rgba(240,192,48,.5); }
.title-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.stats { display: flex; gap: 14px; font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.stats b { color: var(--gold-bright); font-size: 13px; }
.prog-bar { height: 4px; background: #1a1208; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e05020); border-radius: 2px; transition: width .4s; }

/* ── TABS ── */
.tabs {
  position: sticky; top: 84px; z-index: 199;
  display: flex; overflow-x: auto; scrollbar-width: none;
  background: #0a0804;
  border-bottom: 1px solid #3a2a10;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 8px 14px; font-size: 12px;
  color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab.active { color: var(--gold-bright); border-bottom-color: var(--gold-bright); background: rgba(240,192,48,.06); }

/* ── SEARCH ── */
.search-wrap { padding: 10px 12px; background: var(--bg); }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid #3a2a10;
  border-radius: 6px; padding: 9px 12px; color: var(--text); font-size: 14px; outline: none;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--text-dim); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px; padding: 0 10px 20px;
  max-width: 640px; margin: 0 auto;
}

/* ── CARD ITEM ── */
.card-item {
  border-radius: 6px; border: 2px solid var(--card-border);
  overflow: hidden; cursor: pointer; transition: transform .12s;
  position: relative;
  background: var(--card-cream);
}
.card-item:active { transform: scale(0.96); }
.card-item.owned { box-shadow: 0 0 0 2px var(--gold), 0 3px 12px rgba(0,0,0,.6); }
.card-item.not-owned { filter: saturate(50%) brightness(0.65); }

.card-top {
  background: #1a0a04; display: flex; align-items: center;
  justify-content: space-between; padding: 3px 6px;
  border-bottom: 1px solid var(--card-border);
}
.card-num { font-size: 10px; font-weight: 700; color: var(--card-inner-border); font-family: monospace; flex-shrink: 0; }
.card-name-small {
  font-size: 9px; color: #d4b870; text-align: center; flex: 1;
  padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rarity-badge {
  font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 2px;
  color: #fff; flex-shrink: 0;
}
.r-SS { background: var(--ss); } .r-S { background: var(--s); }
.r-A  { background: var(--a); } .r-B { background: var(--b); }
.r-C  { background: var(--c); } .r-D { background: var(--d); }
.r-F  { background: var(--f); } .r-G { background: var(--g); }
.r-   { background: var(--c); }

.card-img-wrap {
  position: relative; overflow: hidden;
  height: 140px; background: #2a1a08;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
}
.card-img {
  width: 100%; height: 100%;
  object-fit: contain; object-position: center;
  display: block;
}
.img-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; background: #c8b888;
}
.cnt-badge {
  position: absolute; top: 4px; right: 4px; z-index: 2;
  background: var(--gold-bright); color: #1a0800;
  font-size: 11px; font-weight: 900; min-width: 20px; height: 20px;
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  padding: 0 4px; border: 1.5px solid var(--card-border);
}
.cnt-badge.zero { background: #555; color: #888; border-color: #444; }

.card-desc-area {
  padding: 5px 7px; background: var(--card-cream);
  font-size: 8.5px; color: #2a1808; line-height: 1.45;
  height: 46px; overflow: hidden;
}

.card-ctrl {
  display: flex; align-items: center; background: #1a0a04;
  border-top: 1px solid var(--card-border);
}
.ctrl-btn {
  flex: 0 0 36px; height: 30px; background: none; border: none;
  color: var(--gold-bright); font-size: 18px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:active { background: rgba(240,192,48,.15); }
.ctrl-num {
  flex: 1; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--card-inner-border);
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 2px solid var(--gold);
  border-radius: 10px; max-width: 340px; width: 100%;
  max-height: 92vh; overflow-y: auto;
}
.modal-hd {
  background: linear-gradient(135deg,#1a0a04,#2e1408);
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--gold); border-radius: 8px 8px 0 0;
  position: sticky; top: 0; z-index: 10;
}
.modal-hd-title { font-size: 15px; font-weight: 700; color: var(--gold-bright); }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; }

.modal-body { padding: 14px; }

/* Card frame in modal */
.mcard-frame {
  border: 3px solid var(--card-border); border-radius: 6px; overflow: hidden;
  background: var(--card-cream); margin-bottom: 14px;
}
.mcard-top {
  background: #1a0a04; padding: 5px 10px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--card-border);
}
.mcard-img-wrap {
  height: 240px; background: #2a1a08; overflow: hidden;
  border-bottom: 2px solid var(--card-inner-border);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.mcard-img { width: 100%; height: 100%; object-fit: contain; object-position: center; }
.mcard-img-fallback {
  width: 100%; height: 100%; display: flex;
  align-items: center; justify-content: center; font-size: 64px;
}
.mcard-namebar {
  background: #120804; text-align: center; padding: 4px 8px;
  font-size: 12px; color: var(--card-inner-border);
  border-bottom: 1px solid var(--card-border);
}
.mcard-text { padding: 10px 10px; font-size: 11px; color: #2a1808; line-height: 1.65; }

/* Count row */
.count-row {
  background: #120804; border-radius: 8px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.count-label { font-size: 12px; color: var(--text-dim); flex: 1; }
.count-ctrl { display: flex; align-items: center; gap: 8px; }
.count-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--gold); background: none;
  color: var(--gold-bright); font-size: 20px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.count-btn:active { background: rgba(240,192,48,.2); }
.count-num { font-size: 28px; font-weight: 900; color: var(--gold-bright); min-width: 40px; text-align: center; }

.meta-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
.chip-gold { background: rgba(201,150,15,.15); color: var(--gold-bright); }
.chip-dim  { background: rgba(255,255,255,.06); color: var(--text-dim); }

.empty { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: var(--text-dim); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.backup-bar { display: flex; gap: 8px; margin-top: 8px; }
.backup-btn { flex: 1; padding: 6px 0; border-radius: 6px; border: 1px solid var(--gold); font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; background: rgba(201,150,15,.1); color: var(--gold-bright); }
.backup-btn:active { background: rgba(201,150,15,.25); }
.backup-btn.restore { border-color: var(--text-dim); color: var(--text-dim); background: none; }
.backup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; }
.backup-overlay.hidden { display: none; }
.backup-modal { background: var(--surface); border: 2px solid var(--gold); border-radius: 10px; width: 100%; max-width: 360px; padding: 20px; }
.backup-modal h3 { color: var(--gold-bright); font-size: 15px; margin-bottom: 12px; }
.backup-textarea { width: 100%; height: 120px; background: #0d0a05; border: 1px solid #3a2a10; border-radius: 6px; padding: 10px; color: var(--text); font-size: 11px; font-family: monospace; resize: none; outline: none; margin-bottom: 12px; }
.backup-modal-btns { display: flex; gap: 8px; }
.bm-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
.bm-btn.primary { background: var(--gold); color: #1a0800; }
.bm-btn.secondary { background: #2a1c0e; color: var(--text-dim); border: 1px solid #3a2a10; }
</style>
</head>
<body>

<header>
  <div class="hrow1">
    <div class="title-wrap">
      <div class="title-main">🃏 貪婪之島</div>
      <div class="title-sub">GREED ISLAND · 指定口袋卡圖鑑</div>
    </div>
  </div>
  <div class="stats">
    <span>持有 <b id="sOwned">0</b> 種</span>
    <span>合計 <b id="sTotal">0</b> 張</span>
    <span>完成 <b id="sPct">0%</b></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="backup-bar">
    <button class="backup-btn" id="exportBtn">📤 匯出備份</button>
    <button class="backup-btn restore" id="importBtn">📥 匯入備份</button>
  </div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-t="all">全部</div>
  <div class="tab" data-t="owned">持有中</div>
  <div class="tab" data-t="missing">未持有</div>
  <div class="tab" data-t="SS">SS</div>
  <div class="tab" data-t="S">S</div>
  <div class="tab" data-t="A">A</div>
  <div class="tab" data-t="B">B</div>
  <div class="tab" data-t="D+">D/G</div>
  <div class="tab" data-t="free">自由口袋</div>
</div>

<div class="search-wrap">
  <input class="search-input" id="searchInput" placeholder="🔍 搜尋卡號、名稱或效果…">
</div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-hd-title" id="mTitle">卡片詳情</div>
      <button class="modal-close" id="mClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="mcard-frame">
        <div class="mcard-top">
          <span id="mNum" style="font-size:13px;font-weight:700;color:#b8922a;font-family:monospace"></span>
          <span id="mRarity" class="rarity-badge"></span>
        </div>
        <div class="mcard-img-wrap">
          <img id="mImg" class="mcard-img" src="" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
          <div id="mFallback" class="mcard-img-fallback" style="display:none">🃏</div>
        </div>
        <div class="mcard-namebar" id="mName"></div>
        <div class="mcard-text" id="mDesc"></div>
      </div>

      <div class="count-row">
        <div class="count-label">我的持有數量</div>
        <div class="count-ctrl">
          <button class="count-btn" id="mMinus">−</button>
          <div class="count-num" id="mCount">0</div>
          <button class="count-btn" id="mPlus">＋</button>
        </div>
      </div>

      <div class="meta-chips" id="mMeta"></div>
    </div>
  </div>
</div>

// ── State ──
let counts = {};
let curTab = 'all';
let searchQ = '';
let modalId = null;

function load() {
  try { counts = JSON.parse(localStorage.getItem('gi_counts') || '{}'); } catch(e) { counts = {}; }
}
function save() {
  try { localStorage.setItem('gi_counts', JSON.stringify(counts)); } catch(e) {}
}
function cnt(id) { return counts[id] || 0; }
function setCnt(id, v) { counts[id] = Math.max(0, v); save(); }

// ── Filter ──
function filtered() {
  const q = searchQ.toLowerCase();
  return CARDS.filter(c => {
    if (q && !c.id.includes(q) && !c.name.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    switch(curTab) {
      case 'owned':   return cnt(c.id) > 0;
      case 'missing': return cnt(c.id) === 0;
      case 'SS': case 'S': case 'A': case 'B': return c.rarity === curTab;
      case 'D+': return ['D','G'].includes(c.rarity);
      case 'free': return parseInt(c.id) >= 163 || c.id === '-003';
      default: return true;
    }
  });
}

// ── Stats ──
function updateStats() {
  const mainCards = CARDS.filter(c => !(parseInt(c.id) >= 163 || c.id === '-003'));
  const own = mainCards.filter(c => cnt(c.id) > 0).length;
  const tot = CARDS.reduce((s,c) => s+cnt(c.id), 0);
  const pct = Math.round(own/mainCards.length*100);
  document.getElementById('sOwned').textContent = own;
  document.getElementById('sTotal').textContent = tot;
  document.getElementById('sPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

// ── Render ──
function rarity2cls(r) { return 'r-' + (r||''); }

function renderGrid() {
  const cards = filtered();
  const grid = document.getElementById('grid');
  if (!cards.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🃏</div>沒有找到對應的卡片</div>';
    return;
  }
  grid.innerHTML = cards.map(c => {
    const n = cnt(c.id);
    const owned = n > 0;
    return `<div class="card-item ${owned?'owned':'not-owned'}" data-id="${c.id}">
      <div class="card-top">
        <span class="card-num">No.${c.id}</span>
        <span class="card-name-small">${c.name}</span>
        <span class="rarity-badge ${rarity2cls(c.rarity)}">${c.rarity}</span>
      </div>
      <div class="card-img-wrap">
        <img class="card-img" src="${c.img}" alt="${c.name}" loading="lazy"
             onerror="this.style.display='none';this.nextSibling.style.display='flex'">
        <div class="img-fallback" style="display:none">🃏</div>
        <div class="cnt-badge ${n===0?'zero':''}">${n}</div>
      </div>
      <div class="card-desc-area">${c.desc}</div>
      <div class="card-ctrl">
        <button class="ctrl-btn" data-id="${c.id}" data-a="dec">−</button>
        <div class="ctrl-num">${n}張</div>
        <button class="ctrl-btn" data-id="${c.id}" data-a="inc">＋</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

// ── Events ──
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-a]');
  if (btn) {
    e.stopPropagation();
    const id = btn.dataset.id, a = btn.dataset.a;
    setCnt(id, cnt(id) + (a==='inc'?1:-1));
    renderGrid();
    return;
  }
  const item = e.target.closest('.card-item');
  if (item) openModal(item.dataset.id);
});

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  curTab = tab.dataset.t;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  renderGrid();
});

// ── Modal ──
function openModal(id) {
  const c = CARDS.find(x=>x.id===id);
  if (!c) return;
  modalId = id;
  document.getElementById('mTitle').textContent = `No.${c.id} ${c.name}`;
  document.getElementById('mNum').textContent = `No.${c.id}`;
  const rb = document.getElementById('mRarity');
  rb.textContent = c.rarity; rb.className = 'rarity-badge ' + rarity2cls(c.rarity);
  const img = document.getElementById('mImg');
  const fb = document.getElementById('mFallback');
  img.style.display = ''; fb.style.display = 'none';
  img.src = c.img; img.alt = c.name;
  document.getElementById('mName').textContent = c.name;
  document.getElementById('mDesc').textContent = c.desc;
  document.getElementById('mCount').textContent = cnt(id);
  document.getElementById('mMeta').innerHTML = `
    <span class="chip chip-gold">稀有度 ${c.rarity}</span>
    <span class="chip chip-dim">限制 ${c.cost} DP</span>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}

document.getElementById('mClose').onclick = closeModal;
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  if (modalId) renderGrid();
  modalId = null;
}
document.getElementById('mPlus').onclick = () => {
  if (!modalId) return;
  setCnt(modalId, cnt(modalId)+1);
  document.getElementById('mCount').textContent = cnt(modalId);
  updateStats();
};
document.getElementById('mMinus').onclick = () => {
  if (!modalId) return;
  setCnt(modalId, cnt(modalId)-1);
  document.getElementById('mCount').textContent = cnt(modalId);
  updateStats();
};

// ── Init ──
load();
renderGrid();
</script>

<script>

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  banner.style.display = 'flex';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.style.display = 'none';
});

document.getElementById('dismissBtn').addEventListener('click', () => {
  banner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  banner.style.display = 'none';
  deferredPrompt = null;
});
</script>

<script>
// ── Backup / Restore ──
let backupMode = 'export';

document.getElementById('exportBtn').addEventListener('click', () => {
  backupMode = 'export';
  const data = JSON.stringify(counts);
  document.getElementById('backupTitle').textContent = '📤 匯出備份';
  document.getElementById('backupDesc').textContent = '複製下方文字，儲存到記事本或 LINE 傳給自己，下次可以匯入還原。';
  document.getElementById('backupTextarea').value = data;
  document.getElementById('backupTextarea').readOnly = true;
  document.getElementById('backupAction').textContent = '複製到剪貼簿';
  document.getElementById('backupOverlay').classList.remove('hidden');
});

document.getElementById('importBtn').addEventListener('click', () => {
  backupMode = 'import';
  document.getElementById('backupTitle').textContent = '📥 匯入備份';
  document.getElementById('backupDesc').textContent = '將之前匯出的備份文字貼到下方，然後按「匯入」。';
  document.getElementById('backupTextarea').value = '';
  document.getElementById('backupTextarea').readOnly = false;
  document.getElementById('backupAction').textContent = '匯入';
  document.getElementById('backupOverlay').classList.remove('hidden');
});

document.getElementById('backupAction').addEventListener('click', () => {
  if (backupMode === 'export') {
    const text = document.getElementById('backupTextarea').value;
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById('backupAction').textContent = '✅ 已複製！';
      setTimeout(() => { document.getElementById('backupAction').textContent = '複製到剪貼簿'; }, 2000);
    }).catch(() => {
      document.getElementById('backupTextarea').select();
      document.execCommand('copy');
      document.getElementById('backupAction').textContent = '✅ 已複製！';
      setTimeout(() => { document.getElementById('backupAction').textContent = '複製到剪貼簿'; }, 2000);
    });
  } else {
    try {
      const text = document.getElementById('backupTextarea').value.trim();
      const parsed = JSON.parse(text);
      counts = parsed;
      save();
      renderGrid();
      document.getElementById('backupOverlay').classList.add('hidden');
      alert('✅ 匯入成功！');
    } catch(e) {
      alert('❌ 格式錯誤，請確認貼上的是正確的備份文字');
    }
  }
});

document.getElementById('backupClose').addEventListener('click', () => {
  document.getElementById('backupOverlay').classList.add('hidden');
});
document.getElementById('backupOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('backupOverlay'))
    document.getElementById('backupOverlay').classList.add('hidden');
});
</script>
</body>
</html>
